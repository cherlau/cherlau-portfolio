      marginRight: '6px',
      marginBottom: '6px',
      letterSpacing: '0.05em',
      fontWeight: 500,
      whiteSpace: 'nowrap'

      {label}
    </span>
  );
}

function NavItem({ id, label, activeSection, onClick }) {
  const active = activeSection === id;
  return (
    <li style={{ marginBottom: '4px' }}>
      <a
        href={`#${id}`}
        onClick={(e) => { e.preventDefault(); onClick(id); }}
        style={{
          display: 'flex', alignItems: 'center', gap: '12px',
          textDecoration: 'none', padding: '6px 0',
          transition: 'all 0.2s',
          color: active ? '#ccd6f6' : '#8892b0',
        }}
      >
        <span style={{
          display: 'block',
          height: '1px',
          width: active ? '48px' : '24px',
          background: active ? '#ccd6f6' : '#495670',
          transition: 'all 0.3s ease',
          flexShrink: 0
        }} />
        <span style={{
          fontSize: '12px', letterSpacing: '0.12em', textTransform: 'uppercase',
          fontWeight: active ? '600' : '400',
          transition: 'all 0.2s'
        }}>
          {label}
        </span>
      </a>
    </li>
  );
}

          gridRow: '1',
          borderRadius: '4px',
          overflow: 'hidden',
          height: '340px',
          background: `${accent}18`,
          position: 'relative'
        }}>

            position: 'absolute', inset: 0,
            background: `${accent}18`,

        {/* Text side */}
        <div style={{
          gridColumn: isEven ? '2' : '1',
          gridRow: '1',
          position: 'relative', zIndex: 2,
          textAlign: isEven ? 'right' : 'left',
          padding: isEven ? '0 0 0 0' : '0',
          paddingLeft: isEven ? '0' : '0'
        }}>

            borderRadius:'4px',

            display:'flex', flexWrap:'wrap', gap:'16px',
            justifyContent: isEven ? 'flex-end' : 'flex-start',
            marginBottom:'16px',
            fontFamily:"'Fira Code',monospace", fontSize:'13px', color:'#8892b0'
          }}>
            {p.tags.map(t => <span key={t}>{t}</span>)}
          </div>

          {/* Icons */}
          <div style={{ display:'flex', gap:'14px', justifyContent: isEven ? 'flex-end' : 'flex-start' }}>
            {p.github && (
              <a href={p.github} target="_blank" rel="noreferrer" style={{ color:'#a8b2d8', transition:'color 0.2s, transform 0.2s', display:'flex' }}
                 onMouseEnter={e => { e.currentTarget.style.color = accent; e.currentTarget.style.transform = 'translateY(-2px)'; }}
                 onMouseLeave={e => { e.currentTarget.style.color = '#a8b2d8'; e.currentTarget.style.transform = 'translateY(0)'; }}>
                <GithubIcon />
              </a>
            )}
            {p.live && (
              <a href={p.live} target="_blank" rel="noreferrer" style={{ color:'#a8b2d8', transition:'color 0.2s, transform 0.2s', display:'flex' }}
                 onMouseEnter={e => { e.currentTarget.style.color = accent; e.currentTarget.style.transform = 'translateY(-2px)'; }}
                 onMouseLeave={e => { e.currentTarget.style.color = '#a8b2d8'; e.currentTarget.style.transform = 'translateY(0)'; }}>
                <ExternalIcon />
              </a>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────
function App() {
  const [activeSection, setActiveSection] = useState('about');
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const accent = tweaks.accent;

  // Tweaks panel wiring
  useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') document.getElementById('tweaks-panel').classList.add('visible');
      if (e.data?.type === '__deactivate_edit_mode') document.getElementById('tweaks-panel').classList.remove('visible');
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');

    const accentEl = document.getElementById('tw-accent');
    const bgEl = document.getElementById('tw-bg');
    const fontEl = document.getElementById('tw-font');
    const sizeEl = document.getElementById('tw-size');

    const apply = () => {
      const next = {
        accent: accentEl.value,
        bg: bgEl.value,
        font: fontEl.value,
        fontSize: parseInt(sizeEl.value)
      };
      document.body.style.background = next.bg;
      document.body.style.fontSize = next.fontSize + 'px';
      document.body.style.fontFamily = next.font;
      setTweaks(next);
      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: next }, '*');
    };
    [accentEl, bgEl, fontEl, sizeEl].forEach(el => el?.addEventListener('input', apply));
    return () => window.removeEventListener('message', handler);
  }, []);

  // Scroll spy
  useEffect(() => {
    const sections = ['about', 'experience', 'projects', 'contact'];
    const handler = () => {
      const scrollY = window.scrollY + 200;
      for (let s of sections) {
        const el = document.getElementById(s);
        if (el && el.offsetTop <= scrollY) setActiveSection(s);
      }
    };
    window.addEventListener('scroll', handler);
    return () => window.removeEventListener('scroll', handler);
  }, []);

  const scrollTo = (id) => {
    const el = document.getElementById(id);
    if (el) window.scrollTo({ top: el.offsetTop - 80, behavior: 'smooth' });
  };

  const sidebarStyle = {
    position: 'sticky', top: 0, height: '100vh',
    display: 'flex', flexDirection: 'column',
    justifyContent: 'space-between', padding: '80px 0'
  };

  return (
    <div style={{ maxWidth: '1200px', margin: '0 auto', padding: '0 48px', display: 'grid', gridTemplateColumns: '360px 1fr', gap: '0 80px' }}>
      {/* LEFT SIDEBAR */}
      <div style={sidebarStyle}>
        <div>
          {/* Intro */}
          <p style={{ color: accent, fontFamily: "'Fira Code', monospace", fontSize: '14px', marginBottom: '16px' }}>
            Olá, meu nome é
          </p>
          <h1 style={{ color: '#ccd6f6', fontSize: '48px', fontWeight: 700, lineHeight: 1.05, marginBottom: '8px', letterSpacing: '-0.02em' }}>
            Cherlau Prado.
          </h1>
          <h2 style={{ color: '#8892b0', fontSize: '28px', fontWeight: 500, marginBottom: '20px', lineHeight: 1.2 }}>
            Eu construo coisas <br />para a web.
          </h2>
          <p style={{ maxWidth: '280px', lineHeight: 1.7, fontSize: '15px' }}>
            {data.intro}
          </p>

          {/* Nav */}
          <nav style={{ marginTop: '48px' }}>
            <ul style={{ listStyle: 'none' }}>
              {[['about', 'Sobre Mim'], ['experience', 'Experiência'], ['projects', 'Projetos'], ['contact', 'Contato']].map(([id, label]) => (
                <NavItem key={id} id={id} label={label} activeSection={activeSection} onClick={scrollTo} />
              ))}
            </ul>
          </nav>
        </div>

        {/* Social links */}
        <div style={{ display: 'flex', gap: '20px', alignItems: 'center' }}>
          {[
            { href: data.social.github, icon: <GithubIcon /> },
            { href: data.social.linkedin, icon: <LinkedinIcon /> },
            { href: `mailto:${data.social.email}`, icon: <EmailIcon /> }
          ].map(({ href, icon }) => (
            <a key={href} href={href} target="_blank" rel="noreferrer" style={{
              color: '#a8b2d8', transition: 'color 0.2s, transform 0.2s',
              display: 'flex', alignItems: 'center'
            }}
            onMouseEnter={e => { e.currentTarget.style.color = accent; e.currentTarget.style.transform = 'translateY(-2px)'; }}
            onMouseLeave={e => { e.currentTarget.style.color = '#a8b2d8'; e.currentTarget.style.transform = 'translateY(0)'; }}>
              {icon}
            </a>
          ))}
        </div>
      </div>

      {/* RIGHT CONTENT */}
      <main style={{ padding: '100px 0' }}>
        <AboutSection accent={accent} />
        <ExperienceSection accent={accent} />
        <ProjectsSection accent={accent} />
        <ContactSection accent={accent} />

        {/* Footer */}
        <footer style={{ textAlign: 'center', padding: '20px 0 40px', borderTop: '1px solid #233554' }}>
          <a href={data.social.github} target="_blank" rel="noreferrer" style={{
            color: '#495670', fontSize: '13px', fontFamily: "'Fira Code', monospace",
            textDecoration: 'none', transition: 'color 0.2s',
            display: 'inline-flex', alignItems: 'center', gap: '6px'
          }}
          onMouseEnter={e => e.currentTarget.style.color = accent}
          onMouseLeave={e => e.currentTarget.style.color = '#495670'}>
            Desenvolvido por Cherlau Prado
          </a>
        </footer>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
